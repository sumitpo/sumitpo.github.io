---
layout: default
title: 分类
---

<h1>文章分类</h1>

<ul>
  {% for category in site.categories %}
    <li>
      <h2>{{ category[0] | capitalize }}</h2>
      <ul>
        {% for post in category[1] %}
          <li>
            <a href="{{ post.url }}">{{ post.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </li>
  {% endfor %}
</ul>
