---
layout: default
title: "{{ page.category | capitalize }} 类文章"
---

<h1>{{ page.title }}</h1>

<ul class="category-list">
  {% for post in site.categories[page.category] %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      <time>{{ post.date | date: "%Y年%m月%d日" }}</time>
    </li>
  {% endfor %}
</ul>
