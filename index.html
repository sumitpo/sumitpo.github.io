---
layout: default
title: 首页
description: 欢迎来到我的个人博客，记录学习与思考。
---

<!-- Hero Section -->
<section class="hero">
  <h1>{{ site.title }}</h1>
  <p>{{ page.description }}</p>
</section>

<!-- Latest Posts -->
<section class="posts">
  <h2>最新文章</h2>
  <ul class="post-list">
    {% for post in site.posts %}
      <li class="post-item">
        <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
        <time>{{ post.date | date: "%Y年%m月%d日" }}</time>
        <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
      </li>
    {% endfor %}
  </ul>
</section>
